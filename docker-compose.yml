version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: mirror-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: mirror-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mirror
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Aa112211
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: mirror-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: mirror-neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/Aa112211
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  neo4j_data:
